# nginx vhost for the aancha app on n1 (proxies to 127.0.0.1:8087).
# TEST host: youtube.serezhkin.com (Vany's channel).
# PROD host later: aancha.serezhkin.com — same file, swap server_name.
# DNS: CNAME -> n1.serezhkin.com (matches the music.serezhkin.com pattern),
# NOT the www box. certbot --nginx adds the TLS server block after DNS resolves.
server {
    listen 80;
    listen [::]:80;
    server_name youtube.serezhkin.com;

    location / {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m; # collector harvest bundles
    }
}
