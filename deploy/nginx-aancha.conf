# /etc/nginx/sites-available/aancha.serezhkin.com
# certbot --nginx will add the TLS server block after DNS exists.
server {
    listen 80;
    listen [::]:80;
    server_name aancha.serezhkin.com;

    location / {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m; # collector harvest bundles
    }
}
